<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Frete - Gestão Frete</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h2>Gestão Frete</h2>
    <a href="gestor.html" class="btn small secondary">Voltar</a>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Cadastrar Frete</h1>

      <form id="formFrete" class="form">
        <h3>Origem</h3>
        <input type="text" id="origemCidade" placeholder="Cidade de origem" required />
        <input type="text" id="origemEstado" placeholder="Estado de origem" required />
        <input type="text" id="enderecoColeta" placeholder="Endereço completo da coleta" required />

        <h3>Destino</h3>
        <input type="text" id="destinoCidade" placeholder="Cidade de destino" required />
        <input type="text" id="destinoEstado" placeholder="Estado de destino" required />
        <input type="text" id="enderecoEntrega" placeholder="Endereço completo da entrega" required />

        <h3>Carga</h3>
        <input type="text" id="carga" placeholder="Tipo de carga" required />
        <input type="text" id="peso" placeholder="Peso aproximado" required />
        <input type="number" id="valor" placeholder="Valor do frete" required />

        <h3>Veículo necessário</h3>
        <select id="tipoCaminhao" required>
          <option value="">Tipo de caminhão</option>
          <option value="vuc">VUC</option>
          <option value="toco">Toco</option>
          <option value="truck">Truck</option>
          <option value="carreta">Carreta</option>
          <option value="bitrem">Bitrem</option>
          <option value="rodotrem">Rodotrem</option>
        </select>

        <select id="carroceria" required>
          <option value="">Tipo de carroceria</option>
          <option value="bau">Baú</option>
          <option value="sider">Sider</option>
          <option value="graneleiro">Graneleiro</option>
          <option value="grade_baixa">Grade baixa</option>
          <option value="prancha">Prancha</option>
          <option value="tanque">Tanque</option>
          <option value="cacamba">Caçamba</option>
          <option value="frigorifico">Frigorífico</option>
        </select>

        <textarea id="observacoes" placeholder="Observações do frete"></textarea>

        <button type="submit" class="btn primary">Publicar Frete</button>
      </form>

      <p id="mensagem"></p>
    </section>
  </main>

  <script type="module" src="js/novo-frete.js"></script>
</body>
</html>
