<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fretes Disponíveis - Gestão Frete</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <h2>Gestão Frete</h2>
    <a href="motorista.html" class="btn small secondary">Voltar</a>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Fretes disponíveis</h1>

      <div class="filters">
        <select id="filtroOrigemEstado">
          <option value="">Origem: carregando estados...</option>
        </select>

        <select id="filtroOrigemCidade" disabled>
          <option value="">Origem: selecione o estado</option>
        </select>

        <select id="filtroDestinoEstado">
          <option value="">Destino: carregando estados...</option>
        </select>

        <select id="filtroDestinoCidade" disabled>
          <option value="">Destino: selecione o estado</option>
        </select>

        <button id="btnFiltrar" class="btn primary">Filtrar</button>
        <button id="btnLimparFiltros" class="btn secondary">Limpar</button>
      </div>

      <div id="listaFretes" class="lista"></div>
    </section>
  </main>

  <script type="module" src="js/fretes.js"></script>
</body>
</html>
