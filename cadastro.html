<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro do Caminhoneiro - Gestão Frete</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="hero">
    <section class="card">
      <h1>Cadastro do Caminhoneiro</h1>
      <p>Crie sua conta para encontrar fretes disponíveis.</p>

      <form id="formCadastro" class="form">
        <input type="text" id="nome" placeholder="Nome completo" required />
        <input type="tel" id="telefone" placeholder="WhatsApp" required />
        <input type="email" id="email" placeholder="E-mail" required />
        <input type="password" id="senha" placeholder="Senha" required />

        <select id="estadoAtual" required>
          <option value="">Carregando estados...</option>
        </select>

        <select id="cidadeAtual" required disabled>
          <option value="">Selecione primeiro o estado</option>
        </select>

        <button type="submit" class="btn primary">Cadastrar como Caminhoneiro</button>
      </form>

      <p id="mensagem"></p>

      <a href="login-motorista.html" class="link">Já tenho conta</a>
      <br />
      <a href="index.html" class="link">Voltar ao início</a>
    </section>
  </main>

  <script type="module" src="js/cadastro.js"></script>
</body>
</html>
