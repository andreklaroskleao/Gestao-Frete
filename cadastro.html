<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro - Gestão Frete</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="hero">
    <section class="card">
      <h1>Criar conta</h1>

      <form id="formCadastro" class="form">
        <input type="text" id="nome" placeholder="Nome completo" required />
        <input type="tel" id="telefone" placeholder="WhatsApp" required />
        <input type="email" id="email" placeholder="E-mail" required />
        <input type="password" id="senha" placeholder="Senha" required />

        <select id="tipo" required>
          <option value="">Tipo de conta</option>
          <option value="gestor">Gestor</option>
          <option value="motorista">Caminhoneiro</option>
        </select>

        <button type="submit" class="btn primary">Cadastrar</button>
      </form>

      <p id="mensagem"></p>

      <a href="login.html" class="link">Já tenho conta</a>
    </section>
  </main>

  <script type="module" src="js/cadastro.js"></script>
</body>
</html>
