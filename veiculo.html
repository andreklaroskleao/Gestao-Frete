<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Veículos - Gestão Frete</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <strong>Gestão Frete</strong>
      <span>Meus veículos</span>
    </div>
    <a href="motorista.html" class="btn secondary small">Voltar</a>
  </header>

  <main class="app-container">
    <section class="welcome-card">
      <div>
        <h1>Meus veículos</h1>
        <p>Cadastre mais de um veículo e escolha qual está disponível para fretes.</p>
      </div>
    </section>

    <section class="panel">
      <h2>Cadastrar / editar veículo</h2>

      <form id="formVeiculo" class="form">
        <input type="hidden" id="veiculoId" />

        <select id="estadoAtual" required>
          <option value="">Carregando estados...</option>
        </select>

        <select id="cidadeAtual" required disabled>
          <option value="">Selecione primeiro o estado</option>
        </select>

        <select id="tipoCaminhao" required>
          <option value="">Tipo de caminhão</option>
          <option value="vuc">VUC</option>
          <option value="toco">Toco</option>
          <option value="truck">Truck</option>
          <option value="carreta">Carreta</option>
          <option value="bitrem">Bitrem</option>
          <option value="rodotrem">Rodotrem</option>
        </select>

        <select id="carroceria" required>
          <option value="">Tipo de carroceria</option>
          <option value="bau">Baú</option>
          <option value="sider">Sider</option>
          <option value="graneleiro">Graneleiro</option>
          <option value="grade_baixa">Grade baixa</option>
          <option value="prancha">Prancha</option>
          <option value="tanque">Tanque</option>
          <option value="cacamba">Caçamba</option>
          <option value="frigorifico">Frigorífico</option>
        </select>

        <input type="text" id="capacidade" placeholder="Capacidade. Ex: 12 toneladas" required />
        <input type="text" id="placa" placeholder="Placa do veículo" required />
        <input type="text" id="whatsapp" placeholder="WhatsApp" required />

        <label class="check-line">
          <input type="checkbox" id="principal" />
          Definir como veículo principal
        </label>

        <label class="check-line">
          <input type="checkbox" id="ativo" checked />
          Veículo disponível para fretes
        </label>

        <div class="actions">
          <button type="submit" class="btn primary">Salvar veículo</button>
          <button type="button" id="btnLimpar" class="btn secondary">Novo cadastro</button>
        </div>
      </form>

      <p id="mensagem"></p>
    </section>

    <section class="panel">
      <h2>Veículos cadastrados</h2>
      <div id="listaVeiculos" class="lista"></div>
    </section>
  </main>

  <script type="module" src="js/veiculo.js"></script>
</body>
</html>
