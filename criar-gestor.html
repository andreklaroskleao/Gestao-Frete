<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Criar Gestor</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="hero">
    <section class="card">
      <h1>Criar Gestor</h1>

      <form id="formCriarGestor" class="form">
        <input type="text" id="nome" placeholder="Nome do gestor" required />
        <input type="text" id="telefone" placeholder="WhatsApp" required />
        <input type="email" id="email" placeholder="E-mail" required />
        <input type="password" id="senha" placeholder="Senha" required />

        <button type="submit" class="btn primary">Criar gestor</button>
      </form>

      <p id="mensagem"></p>
    </section>
  </main>

  <script type="module" src="js/criar-gestor.js"></script>
</body>
</html>
