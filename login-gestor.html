<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login do Gestor - Gestão Frete</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="hero">
    <section class="card">
      <h1>Login do Gestor</h1>
      <p>Acesso para empresas, transportadoras e gestores de frete.</p>

      <form id="formLoginGestor" class="form">
        <input type="email" id="email" placeholder="E-mail" required />
        <input type="password" id="senha" placeholder="Senha" required />

        <button type="submit" class="btn primary">Entrar como Gestor</button>
      </form>

      <p id="mensagem"></p>

      <a href="cadastro.html" class="link">Criar conta de gestor</a>
      <br />
      <a href="index.html" class="link">Voltar ao início</a>
    </section>
  </main>

  <script type="module" src="js/login-gestor.js"></script>
</body>
</html>
